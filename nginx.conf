server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name trial.foxandfabletoysellers.com _;

    return 301 https://trial.foxandfabletoysellers.com$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name trial.foxandfabletoysellers.com;

    root /var/www/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/trial.foxandfabletoysellers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trial.foxandfabletoysellers.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|json|ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
